<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Transposer (Full Export)</title>
    <style>
        :root { --mono: 'Consolas', 'Monaco', 'Courier New', monospace; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        textarea, pre { 
            font-family: var(--mono) !important; 
            font-size: 16px;
            white-space: pre; 
            line-height: 1.5;
        }

        textarea { width: 100%; height: 250px; padding: 15px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        
        pre { background: #1e1e1e; color: #d4d4d4; padding: 25px; border-radius: 8px; overflow-x: auto; border-left: 5px solid #28a745; }
        .chord { color: #ffcc00; font-weight: bold; }
        
        button { padding: 10px 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #offsetLabel { font-weight: bold; min-width: 100px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Guitar Transposer</h2>
    
    <textarea id="input" oninput="handleInput()" placeholder="Paste song here..."></textarea>

    <div class="controls">
        <button onclick="changeOffset(-1)">-1</button>
        <button onclick="changeOffset(1)">+1</button>
        <div id="offsetLabel">Original Key</div>
        <button style="background:#007bff" onclick="copyToClipboard()">Copy All (with >)</button>
    </div>

    <pre id="output"></pre>
</div>

<script>
    const sharps = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const flats  = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];
    const normalize = { "Db":"C#", "Eb":"D#", "Gb":"F#", "Ab":"G#", "Bb":"A#", "Cb":"B", "Fb":"E" };

    let currentOffset = 0;
    let useFlats = false;

    window.onload = () => {
        const savedText = localStorage.getItem('guitarSongText');
        if (savedText) {
            document.getElementById('input').value = savedText;
            processText();
        }
    };

    function handleInput() {
        localStorage.setItem('guitarSongText', document.getElementById('input').value);
        processText();
    }

    function transposeChordLine(line, amount) {
        return line.replace(/[A-G][b#]?[^\s/]*(\/[A-G][b#]?[^\s]*)?/g, (match) => {
            return match.split('/').map(part => {
                return part.replace(/[A-G][b#]?/, (note) => {
                    let root = note;
                    if (normalize[root]) root = normalize[root];
                    let index = sharps.indexOf(root);
                    if (index === -1) return note;
                    let newIndex = (index + amount) % 12;
                    while (newIndex < 0) newIndex += 12;
                    return useFlats ? flats[newIndex] : sharps[newIndex];
                });
            }).join('/');
        });
    }

    function processText() {
        const text = document.getElementById('input').value;
        const lines = text.split('\n');
        const htmlOutput = lines.map(line => {
            if (line.trim().startsWith('>')) {
                // CHANGED: We now process the whole line including the '>'
                return `<span class="chord">${transposeChordLine(line, currentOffset)}</span>`;
            }
            return line;
        }).join('\n');
        document.getElementById('output').innerHTML = htmlOutput || "Paste your song...";
    }

    function changeOffset(dir) {
        currentOffset += dir;
        const normalizedShift = ((currentOffset % 12) + 12) % 12;
        const flatKeys = [1, 3, 5, 6, 8, 10, 11]; 
        useFlats = flatKeys.includes(normalizedShift);
        updateUI();
    }

    function updateUI() {
        document.getElementById('offsetLabel').innerText = currentOffset === 0 ? "Original Key" : `Shift: ${currentOffset}`;
        processText();
    }

    function copyToClipboard() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text).then(() => { alert("Copied with formatting!"); });
    }
</script>
</body>
</html>
