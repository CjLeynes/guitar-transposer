<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Transposer Pro</title>
    <style>
        :root { 
            --mono: 'Consolas', 'Monaco', 'Courier New', monospace;
            --bg: #f4f4f4;
            --card: #ffffff;
            --text: #333333;
            --primary: #ffc107; /* Ultimate Guitar Yellow */
        }
        body.dark {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --text: #eeeeee;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; }
        .container { width: 100%; max-width: 1100px; margin: auto; background: var(--card); padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        textarea { width: 100%; height: 200px; font-family: var(--mono); padding: 15px; border: 1px solid #ccc; border-radius: 4px; background: var(--card); color: var(--text); box-sizing: border-box; font-size: 14px; }
        
        .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 20px 0; background: rgba(0,0,0,0.05); padding: 15px; border-radius: 6px; }
        
        pre { background: #000; color: #fff; padding: 25px; border-radius: 6px; overflow-x: auto; font-family: var(--mono); font-size: 16px; line-height: 1.6; min-height: 100px; }
        .chord { color: var(--primary); font-weight: bold; }
        
        button { padding: 8px 16px; cursor: pointer; background: var(--primary); color: #000; border: none; border-radius: 4px; font-weight: bold; font-size: 14px; }
        button:hover { filter: brightness(1.1); }
        .btn-outline { background: transparent; border: 1px solid var(--text); color: var(--text); }
        
        .controls-group { display: flex; align-items: center; gap: 8px; border-right: 1px solid #ccc; padding-right: 15px; }
        #offsetLabel { font-weight: bold; min-width: 80px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0;">Guitar Transposer Pro</h1>
        <button class="btn-outline" onclick="document.body.classList.toggle('dark')">🌓 Toggle Dark Mode</button>
    </div>

    <textarea id="input" oninput="handleInput()" placeholder="Paste chords here... (Use '>' at the start of a line to force chord detection)"></textarea>

    <div class="toolbar">
        <div class="controls-group">
            <span>Transpose:</span>
            <button onclick="changeOffset(-1)">-</button>
            <div id="offsetLabel">0</div>
            <button onclick="changeOffset(1)">+</button>
        </div>

        <div class="controls-group">
            <span>Mode:</span>
            <button id="toggleBtn" class="btn-outline" onclick="manualToggle()">Flats (b)</button>
        </div>

        <button onclick="copyToClipboard()" style="margin-left: auto; background: #28a745; color: white;">Copy Result</button>
        <button onclick="clearAll()" style="background: #dc3545; color: white;">Clear</button>
    </div>

    <div style="font-weight: bold; margin-bottom: 10px;">Output:</div>
    <pre id="output"></pre>
</div>

<script>
    const sharps = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const flats  = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];
    const normalize = { "Db":"C#", "Eb":"D#", "Gb":"F#", "Ab":"G#", "Bb":"A#", "Cb":"B", "Fb":"E" };

    let currentOffset = 0;
    let useFlats = true;

    window.onload = () => {
        const savedText = localStorage.getItem('guitarSongText');
        if (savedText) document.getElementById('input').value = savedText;
        processText();
    };

    function handleInput() {
        localStorage.setItem('guitarSongText', document.getElementById('input').value);
        processText();
    }

    // Smart Chord Detection
    function isChordLine(line) {
        if (line.trim().startsWith('>')) return true;
        const chordPattern = /\b([A-G][b#]?(2|5|6|7|9|11|13|add|maj|min|m|sus|aug|dim|dim7|m7b5|M7)*(\/[A-G][b#]?)?)\b/g;
        const matches = line.match(chordPattern);
        if (!matches) return false;
        const lineContent = line.replace(chordPattern, "").replace(/\s/g, "");
        return lineContent.length < line.length * 0.3; 
    }

    function transposeChord(note, amount) {
        let root = note;
        if (normalize[root]) root = normalize[root];
        let index = sharps.indexOf(root);
        if (index === -1) return note;
        let newIndex = (index + amount) % 12;
        while (newIndex < 0) newIndex += 12;
        return useFlats ? flats[newIndex] : sharps[newIndex];
    }

    function processText() {
        const text = document.getElementById('input').value;
        const lines = text.split('\n');
        const htmlOutput = lines.map(line => {
            if (isChordLine(line)) {
                // Modified: We no longer remove the '>' character here
                const transposed = line.replace(/[A-G][b#]?/g, (match) => transposeChord(match, currentOffset));
                return `<span class="chord">${transposed}</span>`;
            }
            return line;
        }).join('\n');
        document.getElementById('output').innerHTML = htmlOutput || "Waiting for input...";
    }

    function changeOffset(dir) {
        currentOffset += dir;
        updateUI();
    }

    function manualToggle() {
        useFlats = !useFlats;
        updateUI();
    }

    function updateUI() {
        document.getElementById('offsetLabel').innerText = currentOffset;
        document.getElementById('toggleBtn').innerText = useFlats ? "Flats (b)" : "Sharps (#)";
        processText();
    }

    function copyToClipboard() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Copied!"));
    }

    function clearAll() {
        if(confirm("Clear everything?")) {
            document.getElementById('input').value = "";
            localStorage.removeItem('guitarSongText');
            processText();
        }
    }
</script>
</body>
</html>
