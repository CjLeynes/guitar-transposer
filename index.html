<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chords Transposer</title>
    <style>
        :root { --mono: 'Consolas', 'Monaco', 'Courier New', monospace; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        textarea, pre { 
            font-family: var(--mono) !important; 
            font-size: 16px;
            white-space: pre; 
            line-height: 1.5;
            tab-size: 4;
        }

        textarea { width: 100%; height: 250px; padding: 15px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .controls { margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
        
        .output-header { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 10px; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 25px; border-radius: 8px; overflow-x: auto; border-left: 5px solid #28a745; margin: 0; min-height: 50px; }
        .chord { color: #ffcc00; font-weight: bold; }
        
        button { padding: 10px 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; }
        button:hover { background: #218838; }
        .btn-blue { background: #007bff; }
        .btn-blue:hover { background: #0069d9; }
        
        .btn-toggle { background: #495057; color: #fff; border: 2px solid #343a40; }
        .btn-toggle:hover { background: #343a40; }
        
        #offsetLabel { font-weight: bold; min-width: 100px; text-align: center; font-size: 0.9rem; color: #495057; }
        .section-title { font-weight: bold; color: #333; margin-bottom: 5px; }
        .small-btn { padding: 5px 12px; font-size: 14px; background: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <h2>Guitar Transposer</h2>
    
    <div class="section-title">Input Song:</div>
    <textarea id="input" oninput="handleInput()" placeholder="Paste song here... Use '>' for chord lines."></textarea>

    <div class="controls">
        <button type="button" onclick="changeOffset(-1)">-1</button>
        <button type="button" onclick="changeOffset(1)">+1</button>
        <div id="offsetLabel">Original Key</div>
        
        <button type="button" id="toggleBtn" class="btn-toggle" onclick="manualToggle()">Display as: Flats (b)</button>
        
        <button type="button" class="btn-blue" style="margin-left: auto;" onclick="copyToClipboard()">Copy Result</button>
    </div>

    <div class="output-header">
        <div class="section-title">Transposed Output:</div>
        <div>
            <span style="font-size: 0.8rem; margin-right: 5px; color: #666;">Fine-tune output:</span>
            <button type="button" class="small-btn" onclick="changeOffset(-1)">-</button>
            <button type="button" class="small-btn" onclick="changeOffset(1)">+</button>
        </div>
    </div>
    <pre id="output"></pre>
</div>

<script>
    const sharps = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const flats  = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];
    const normalize = { "Db":"C#", "Eb":"D#", "Gb":"F#", "Ab":"G#", "Bb":"A#", "Cb":"B", "Fb":"E", "E#":"F", "B#":"C" };

    let currentOffset = 0;
    let useFlats = true;

    // Initialize
    window.onload = () => {
        const savedText = localStorage.getItem('guitarSongText');
        if (savedText) {
            document.getElementById('input').value = savedText;
        }
        processText();
    };

    function handleInput() {
        localStorage.setItem('guitarSongText', document.getElementById('input').value);
        processText();
    }

    function transposeChordLine(line, amount) {
        return line.replace(/[A-G][b#]?[^\s/]*(\/[A-G][b#]?[^\s]*)?/g, (match) => {
            return match.split('/').map(part => {
                return part.replace(/[A-G][b#]?/, (note) => {
                    let root = note;
                    if (normalize[root]) root = normalize[root];
                    let index = sharps.indexOf(root);
                    if (index === -1) return note;
                    let newIndex = (index + amount) % 12;
                    while (newIndex < 0) newIndex += 12;
                    return useFlats ? flats[newIndex] : sharps[newIndex];
                });
            }).join('/');
        });
    }

    function processText() {
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        if (!input || !output) return;

        const text = input.value;
        const lines = text.split('\n');
        const htmlOutput = lines.map(line => {
            if (line.trim().startsWith('>')) {
                return `<span class="chord">${transposeChordLine(line, currentOffset)}</span>`;
            }
            return line;
        }).join('\n');
        
        output.innerHTML = htmlOutput || "Your transposed song will appear here...";
    }

    function changeOffset(dir) {
        currentOffset += dir;
        updateUI();
    }

    function manualToggle() {
        useFlats = !useFlats;
        updateUI();
    }

    function updateUI() {
        const label = document.getElementById('offsetLabel');
        const toggleBtn = document.getElementById('toggleBtn');
        
        if (label) label.innerText = currentOffset === 0 ? "Original Key" : `Shifted: ${currentOffset}`;
        if (toggleBtn) toggleBtn.innerText = useFlats ? "Display as: Flats (b)" : "Display as: Sharps (#)";
        
        processText();
    }

    function copyToClipboard() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Copied to clipboard!");
        });
    }
</script>
</body>
</html>
